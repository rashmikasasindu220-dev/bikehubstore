<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff176"/>
      <stop offset=".25" stop-color="#facc15"/>
      <stop offset=".64" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#fb923c"/>
    </linearGradient>
    <linearGradient id="blackPaint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#292a2f"/>
      <stop offset=".18" stop-color="#0f1013"/>
      <stop offset=".55" stop-color="#050507"/>
      <stop offset=".82" stop-color="#1d1e23"/>
      <stop offset="1" stop-color="#060607"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e5e7eb" stop-opacity=".62"/>
      <stop offset=".35" stop-color="#111827" stop-opacity=".72"/>
      <stop offset="1" stop-color="#020617" stop-opacity=".96"/>
    </linearGradient>
    <radialGradient id="yellowGlow" cx="55%" cy="55%" r="62%">
      <stop offset="0" stop-color="#facc15" stop-opacity=".55"/>
      <stop offset=".42" stop-color="#facc15" stop-opacity=".18"/>
      <stop offset="1" stop-color="#facc15" stop-opacity="0"/>
    </radialGradient>
    <filter id="bikeShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="36" stdDeviation="24" flood-color="#000000" flood-opacity=".65"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#facc15" flood-opacity=".42"/>
    </filter>
    <filter id="neon">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#facc15" flood-opacity=".95"/>
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#facc15" flood-opacity=".50"/>
    </filter>
    <filter id="blur">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1180" height="720" fill="none"/>
  <ellipse cx="610" cy="390" rx="540" ry="290" fill="url(#yellowGlow)"/>

  <!-- background motion behind bike -->
  <g opacity=".58">
    <path d="M62 536 C238 466 422 419 688 386" stroke="#facc15" stroke-width="7" stroke-linecap="round"/>
    <path d="M142 595 C364 500 592 450 1038 386" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
    <path d="M84 650 C310 552 562 506 1136 430" stroke="#facc15" stroke-width="10" stroke-linecap="round" opacity=".68"/>
    <path d="M686 126 C842 94 1034 96 1162 138" stroke="#facc15" stroke-width="5" stroke-linecap="round" opacity=".42"/>
    <path d="M784 184 H1132" stroke="#facc15" stroke-width="3" stroke-linecap="round" opacity=".35"/>
  </g>

  <!-- floor rings -->
  <g opacity=".7">
    <ellipse cx="610" cy="604" rx="500" ry="76" fill="none" stroke="#facc15" stroke-width="5"/>
    <ellipse cx="610" cy="604" rx="412" ry="54" fill="none" stroke="#f59e0b" stroke-width="2" opacity=".65"/>
    <ellipse cx="610" cy="604" rx="560" ry="95" fill="none" stroke="#facc15" stroke-width="2" opacity=".35"/>
  </g>

  <g filter="url(#bikeShadow)">
    <!-- Wheels -->
    <g>
      <circle cx="782" cy="499" r="112" fill="#050506" stroke="#141417" stroke-width="34"/>
      <circle cx="782" cy="499" r="112" fill="none" stroke="url(#gold)" stroke-width="12" filter="url(#neon)"/>
      <circle cx="782" cy="499" r="74" fill="none" stroke="#6b7280" stroke-width="7"/>
      <circle cx="782" cy="499" r="52" fill="none" stroke="#24242a" stroke-width="10"/>
      <circle cx="782" cy="499" r="19" fill="#0b0b0c" stroke="#facc15" stroke-width="6"/>
      <g stroke="#33343a" stroke-width="4" opacity=".9">
        <path d="M782 390 V608"/>
        <path d="M674 499 H890"/>
        <path d="M706 424 L858 576"/>
        <path d="M858 424 L706 576"/>
        <path d="M738 399 L826 600"/>
        <path d="M826 399 L738 600"/>
      </g>
    </g>

    <g>
      <circle cx="376" cy="517" r="124" fill="#050506" stroke="#141417" stroke-width="38"/>
      <circle cx="376" cy="517" r="124" fill="none" stroke="url(#gold)" stroke-width="14" filter="url(#neon)"/>
      <circle cx="376" cy="517" r="84" fill="none" stroke="#71717a" stroke-width="8"/>
      <circle cx="376" cy="517" r="55" fill="none" stroke="#24242a" stroke-width="11"/>
      <circle cx="376" cy="517" r="22" fill="#0b0b0c" stroke="#facc15" stroke-width="7"/>
      <g stroke="#34343b" stroke-width="4" opacity=".9">
        <path d="M376 393 V641"/>
        <path d="M252 517 H500"/>
        <path d="M288 429 L464 605"/>
        <path d="M464 429 L288 605"/>
        <path d="M330 405 L422 632"/>
        <path d="M422 405 L330 632"/>
      </g>
      <circle cx="376" cy="517" r="62" fill="none" stroke="#d4d4d8" stroke-width="3" opacity=".62"/>
    </g>

    <!-- Rear swing arm and exhaust -->
    <path d="M562 500 C646 534 728 538 814 504" fill="none" stroke="#22232a" stroke-width="18" stroke-linecap="round"/>
    <path d="M504 544 C616 594 718 594 830 518" fill="none" stroke="#09090b" stroke-width="18" stroke-linecap="round"/>
    <path d="M470 531 C538 565 626 574 716 555" fill="none" stroke="#facc15" stroke-width="6" opacity=".65"/>
    <path d="M457 545 C384 583 308 585 238 548" fill="none" stroke="#2d2d33" stroke-width="17" stroke-linecap="round"/>
    <path d="M306 567 C391 599 470 597 548 554" fill="none" stroke="#facc15" stroke-width="5" opacity=".55"/>
    <path d="M548 552 L430 610" stroke="#0b0b0c" stroke-width="22" stroke-linecap="round"/>
    <path d="M430 610 L354 636" stroke="#1f2026" stroke-width="20" stroke-linecap="round"/>
    <path d="M349 636 L318 630" stroke="#d4d4d8" stroke-width="12" stroke-linecap="round"/>

    <!-- Main body fairing -->
    <path d="M298 408 C350 283 473 220 653 213 C799 208 930 268 1028 373 C947 362 848 372 760 414 C651 466 521 475 408 455 C358 446 319 430 298 408Z" fill="url(#blackPaint)" stroke="url(#gold)" stroke-width="7"/>

    <!-- tank and top body -->
    <path d="M444 277 C526 200 698 166 838 248 C762 285 665 300 543 293 C498 291 466 286 444 277Z" fill="#08080a" stroke="#facc15" stroke-width="5"/>
    <path d="M510 257 C594 208 712 198 806 242 C734 250 652 258 548 276Z" fill="#24252b" opacity=".78"/>

    <!-- windshield -->
    <path d="M606 203 C650 122 760 94 844 144 C800 168 742 200 686 242 C651 269 620 252 606 203Z" fill="url(#glass)" stroke="#cbd5e1" stroke-width="4" opacity=".95"/>
    <path d="M648 130 C702 107 760 116 814 145" stroke="#facc15" stroke-width="3" opacity=".68"/>

    <!-- nose/front fairing -->
    <path d="M262 397 C298 297 374 236 492 215 C471 275 438 350 402 459 C350 452 296 426 262 397Z" fill="#070708" stroke="#facc15" stroke-width="6"/>
    <path d="M269 386 C305 312 354 275 438 255 C410 304 390 363 382 422 C330 425 292 409 269 386Z" fill="#16171b"/>
    <path d="M291 369 C340 337 398 326 462 335 C419 366 363 383 297 386Z" fill="#fef08a" stroke="#facc15" stroke-width="5" filter="url(#neon)"/>
    <path d="M310 370 C352 352 391 346 430 348 C399 365 358 374 315 378Z" fill="#fff" opacity=".72"/>
    <path d="M270 408 L140 378" stroke="#facc15" stroke-width="7" stroke-linecap="round" opacity=".55"/>
    <path d="M282 431 L104 438" stroke="#facc15" stroke-width="4" stroke-linecap="round" opacity=".32"/>

    <!-- side panels -->
    <path d="M448 405 C558 424 682 407 812 352 C756 432 628 488 448 475Z" fill="url(#gold)" opacity=".92"/>
    <path d="M482 432 L760 398 L666 505 L405 520Z" fill="#050506" stroke="#facc15" stroke-width="7"/>
    <path d="M528 455 L696 434 L642 486 L458 496Z" fill="url(#gold)" opacity=".92"/>
    <path d="M716 326 C812 318 898 344 984 398 C872 396 800 421 732 488 C756 424 757 371 716 326Z" fill="#09090b" stroke="#facc15" stroke-width="6"/>
    <path d="M760 360 C838 360 906 381 962 419 C870 416 804 438 753 489 C774 434 780 392 760 360Z" fill="#16171b"/>

    <!-- seat/tail -->
    <path d="M600 220 C692 200 800 211 890 253 L835 296 C748 271 670 268 590 292Z" fill="#070708" stroke="#e5e7eb" stroke-width="5"/>
    <path d="M830 240 L1048 178 C1002 256 936 306 834 295Z" fill="url(#blackPaint)" stroke="#facc15" stroke-width="6"/>
    <path d="M887 250 L1040 200" stroke="#facc15" stroke-width="7" stroke-linecap="round" opacity=".85"/>
    <path d="M982 223 L1122 254" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
    <path d="M1035 255 L1120 242" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round"/>

    <!-- forks -->
    <path d="M468 322 L392 527" stroke="#facc15" stroke-width="13" stroke-linecap="round"/>
    <path d="M496 332 L414 544" stroke="#e5e7eb" stroke-width="8" stroke-linecap="round" opacity=".86"/>
    <path d="M410 520 L485 517" stroke="#2d2d33" stroke-width="10" stroke-linecap="round"/>

    <!-- handle bars and mirrors -->
    <path d="M690 202 C744 184 800 190 852 224" stroke="#e5e7eb" stroke-width="10" stroke-linecap="round"/>
    <path d="M836 205 L916 150" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
    <path d="M920 148 L1018 130" stroke="#e5e7eb" stroke-width="12" stroke-linecap="round"/>
    <path d="M552 212 L480 154" stroke="#facc15" stroke-width="8" stroke-linecap="round"/>
    <path d="M477 151 L398 125" stroke="#e5e7eb" stroke-width="12" stroke-linecap="round"/>

    <!-- engine -->
    <circle cx="563" cy="469" r="50" fill="#070708" stroke="#3f3f46" stroke-width="10"/>
    <circle cx="563" cy="469" r="24" fill="#111113" stroke="#facc15" stroke-width="5"/>
    <circle cx="563" cy="469" r="10" fill="#facc15"/>
    <path d="M610 465 C682 460 742 472 810 514" stroke="#3f3f46" stroke-width="12" stroke-linecap="round"/>
    <path d="M534 512 C600 536 674 536 748 510" stroke="#19191d" stroke-width="12" stroke-linecap="round"/>

    <!-- decals and light strips -->
    <path d="M348 420 C426 396 515 398 622 417" fill="none" stroke="#facc15" stroke-width="5" filter="url(#neon)"/>
    <path d="M492 309 C617 276 756 262 920 286" fill="none" stroke="#facc15" stroke-width="4" opacity=".88"/>
    <path d="M774 376 C848 338 930 336 1002 382" fill="none" stroke="#facc15" stroke-width="5" filter="url(#neon)" opacity=".75"/>
    <path d="M537 376 L679 356" stroke="#facc15" stroke-width="5" filter="url(#neon)"/>
    <path d="M422 475 L678 448" stroke="#facc15" stroke-width="4" opacity=".7"/>

    <text x="606" y="410" font-family="Orbitron, Arial, sans-serif" font-size="34" font-weight="900" fill="#facc15" transform="rotate(-10 606 410)">BIKE HUB</text>
  </g>
</svg>